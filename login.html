<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <title>SNS Travel · Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23076653'>🌴</text></svg>"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      * {
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        overflow-x: hidden;
        width: 100%;
        min-height: 100vh;
      }

      body {
        background: #0f172a;
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      /* ===== SIMPLE FADE-IN ===== */
      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gradient-bg {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(52, 211, 153, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(139, 92, 246, 0.15) 0%,
            transparent 40%
          );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        transition: transform 0.2s;
      }

      .glass-card:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 480px) {
        .glass-card {
          padding: 1.5rem !important;
        }
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s;
        font-size: 16px !important;
        padding: 0.75rem 1rem 0.75rem 2.5rem !important;
      }

      .glass-input:focus {
        border-color: #34d399;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
      }

      /* ===== SIMPLE BUTTON HOVER ===== */
      .btn-hover {
        transition: all 0.2s;
      }

      .btn-hover:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(52, 211, 153, 0.2);
      }

      /* Particle Container - Minimal */
      #particles-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        pointer-events: none;
        will-change: transform, opacity;
      }

      /* Simplified particles - just stars and orbs */
      .star-particle {
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        animation: twinkle 4s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.2);
        }
      }

      .orb-particle {
        background: radial-gradient(
          circle at center,
          rgba(52, 211, 153, 0.3),
          transparent
        );
        border-radius: 50%;
        filter: blur(8px);
        animation: float 15s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        20% {
          opacity: 0.2;
        }
        80% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-100vh) translateX(50px);
          opacity: 0;
        }
      }

      .compass-spin {
        animation: spinSlow 20s linear infinite;
      }

      @keyframes spinSlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.1);
        }
      }

      .glow-text {
        text-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
      }

      .checkbox-custom {
        transition: all 0.2s;
      }

      input[type="checkbox"]:checked + .checkbox-custom {
        border-color: #34d399;
        background: rgba(52, 211, 153, 0.1);
      }

      input[type="checkbox"]:checked + .checkbox-custom i {
        display: block;
      }

      /* ===== RESPONSIVE FIXES ===== */
      @media (max-width: 640px) {
        h1.text-4xl {
          font-size: 2rem;
        }
        .w-24.h-24 {
          width: 4rem;
          height: 4rem;
        }
        .text-4xl {
          font-size: 1.5rem;
        }
        .absolute.top-6.right-6 {
          top: 1rem;
          right: 1rem;
        }
        .px-6.py-3 {
          padding: 0.5rem 1rem;
          font-size: 0.8rem;
        }
        .min-h-screen {
          padding: 1rem;
        }
      }

      @media (max-width: 380px) {
        .flex.justify-center.gap-4 {
          gap: 0.5rem;
        }
        .w-12.h-12 {
          width: 2.5rem;
          height: 2.5rem;
        }
      }

      button,
      a,
      .glass-input {
        touch-action: manipulation;
      }

      @media (max-width: 768px) {
        button,
        a {
          min-height: 44px;
        }
      }

      @supports (padding: max(0px)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      /* Fix for password toggle button */
      .password-toggle-btn {
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>
  <body class="fade-in">
    <!-- Gradient Background -->
    <div class="gradient-bg"></div>

    <!-- Particle Container - MINIMAL (15 particles lang) -->
    <div id="particles-container"></div>

    <!-- Back Button -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-50">
      <a
        href="../index.html"
        class="group relative px-4 py-2 sm:px-6 sm:py-3 bg-white/5 backdrop-blur-md rounded-full border border-white/10 hover:border-white/30 transition-all duration-300 text-white/70 hover:text-white text-xs sm:text-sm"
      >
        <span class="flex items-center gap-1 sm:gap-2">
          <i
            class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform duration-300"
          ></i>
          <span class="hidden xs:inline">Back to Home</span>
          <span class="xs:hidden">Back</span>
        </span>
      </a>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-md relative z-20 px-4">
      <!-- Logo -->
      <div class="text-center mb-6 sm:mb-8">
        <div class="relative inline-block">
          <div
            class="absolute inset-0 bg-emerald-500/20 blur-2xl rounded-full pulse"
          ></div>
          <div
            class="relative w-20 h-20 sm:w-24 sm:h-24 mx-auto mb-3 sm:mb-4 glass-card rounded-2xl flex items-center justify-center compass-spin"
          >
            <i class="fas fa-compass text-3xl sm:text-4xl text-emerald-400"></i>
          </div>
        </div>
        <h1
          class="text-3xl sm:text-4xl font-light text-white tracking-[0.2em] sm:tracking-[0.3em] glow-text"
        >
          SNS
        </h1>
        <p class="text-white/40 text-xs sm:text-sm mt-1 sm:mt-2 tracking-wider">
          TRAVEL & TOURS
        </p>
      </div>

      <!-- Login Card -->
      <div
        class="glass-card rounded-2xl sm:rounded-3xl p-6 sm:p-8 relative overflow-hidden"
      >
        <div
          class="absolute -top-20 -right-20 w-40 h-40 bg-emerald-500/5 rounded-full blur-3xl"
        ></div>
        <div
          class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500/5 rounded-full blur-3xl"
        ></div>

        <h2
          class="text-xl sm:text-2xl font-light text-white mb-6 sm:mb-8 text-center relative"
        >
          <span class="relative inline-block">
            Sign In
            <span
              class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-10 sm:w-12 h-0.5 bg-emerald-400/50"
            ></span>
          </span>
        </h2>

        <form id="loginForm" class="space-y-4 sm:space-y-6 relative">
          <!-- Email -->
          <div class="relative group">
            <div
              class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors"
            >
              <i class="fas fa-envelope text-sm sm:text-base"></i>
            </div>
            <input
              type="email"
              id="login-email"
              required
              class="glass-input w-full pl-10 sm:pl-12 pr-4 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 text-sm sm:text-base"
              placeholder="Email address"
            />
          </div>

          <!-- Password with working toggle icon -->
          <div class="relative group">
            <div
              class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors pointer-events-none"
            >
              <i class="fas fa-lock text-sm sm:text-base"></i>
            </div>
            <input
              type="password"
              id="login-password"
              required
              class="glass-input w-full pl-10 sm:pl-12 pr-12 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 text-sm sm:text-base"
              placeholder="Password"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-emerald-400 transition-colors focus:outline-none password-toggle-btn"
              style="cursor: pointer; background: transparent; border: none"
              aria-label="Toggle password visibility"
            >
              <i class="fas fa-eye" id="toggleIcon" style="font-size: 1rem"></i>
            </button>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between text-xs sm:text-sm">
            <label class="flex items-center cursor-pointer group">
              <input type="checkbox" id="remember-me" class="hidden" />
              <div
                class="w-3 h-3 sm:w-4 sm:h-4 border border-white/20 rounded mr-1 sm:mr-2 flex items-center justify-center text-emerald-400 group-hover:border-white/40 transition-colors checkbox-custom"
              >
                <i class="fas fa-check text-[0.5rem] sm:text-xs hidden"></i>
              </div>
              <span
                class="text-white/50 group-hover:text-white/70 transition-colors"
                >Remember me</span
              >
            </label>
            <a
              href="#"
              id="forgotLink"
              class="text-white/30 hover:text-emerald-400 transition-colors flex items-center gap-1"
            >
              <span>Forgot?</span>
              <i class="fas fa-arrow-right text-[0.6rem] sm:text-xs"></i>
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            id="loginBtn"
            class="btn-hover group relative w-full bg-gradient-to-r from-emerald-500/20 to-purple-500/20 hover:from-emerald-500/30 hover:to-purple-500/30 text-emerald-400 font-medium py-3 sm:py-4 rounded-xl transition-all border border-emerald-500/30 overflow-hidden text-sm sm:text-base"
          >
            <span
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"
            ></span>
            <span
              class="relative flex items-center justify-center gap-2 sm:gap-3"
            >
              <i
                class="fas fa-arrow-right group-hover:translate-x-1 transition-transform text-xs sm:text-sm"
              ></i>
              <span>Continue to Dashboard</span>
              <i
                class="fas fa-arrow-right group-hover:translate-x-1 transition-transform text-xs sm:text-sm"
              ></i>
            </span>
          </button>

          <!-- Social Divider -->
          <div class="relative">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-[0.6rem] sm:text-xs">
              <span class="px-3 sm:px-4 bg-[#0f172a] text-white/30"
                >or continue with</span
              >
            </div>
          </div>

          <!-- Social Buttons - Facebook and Gmail (both linked) -->
          <div class="flex justify-center gap-2 sm:gap-4">
            <!-- Gmail Link -->
            <a
              href="https://mail.google.com/"
              target="_blank"
              class="relative group w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/10 hover:border-white/30 text-white/30 hover:text-white transition-all duration-300 overflow-hidden flex items-center justify-center"
            >
              <span
                class="absolute inset-0 bg-white/5 scale-0 group-hover:scale-100 rounded-full transition-transform duration-300"
              ></span>
              <i class="fab fa-google text-sm sm:text-base relative z-10"></i>
            </a>

            <!-- Facebook Link -->
            <a
              href="https://www.facebook.com/profile.php?id=61573791132600"
              target="_blank"
              class="relative group w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/10 hover:border-white/30 text-white/30 hover:text-white transition-all duration-300 overflow-hidden flex items-center justify-center"
            >
              <span
                class="absolute inset-0 bg-white/5 scale-0 group-hover:scale-100 rounded-full transition-transform duration-300"
              ></span>
              <i
                class="fab fa-facebook-f text-sm sm:text-base relative z-10"
              ></i>
            </a>
          </div>
        </form>

        <p
          class="text-center mt-6 sm:mt-8 text-white/30 text-xs sm:text-sm relative"
        >
          New to SNS?
          <a
            href="#"
            class="text-emerald-400 hover:text-emerald-300 transition-colors group"
          >
            Contact us
            <i
              class="fas fa-arrow-right ml-1 text-[0.6rem] sm:text-xs group-hover:translate-x-1 transition-transform"
            ></i>
          </a>
        </p>
      </div>
    </div>

    <!-- Particle Generation Script - MINIMAL (15 particles total) -->
    <script>
      (function () {
        function createMinimalParticles() {
          const container = document.getElementById("particles-container");
          if (!container) return;

          container.innerHTML = "";

          // 10 stars (static but twinkling)
          for (let i = 0; i < 10; i++) {
            const star = document.createElement("div");
            star.className = "particle star-particle";

            const size = Math.random() * 3 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";

            const duration = Math.random() * 3 + 2;
            star.style.animationDuration = duration + "s";
            star.style.animationDelay = Math.random() * 2 + "s";

            container.appendChild(star);
          }

          // 5 floating orbs (slow moving)
          for (let i = 0; i < 5; i++) {
            const orb = document.createElement("div");
            orb.className = "particle orb-particle";

            const size = Math.random() * 40 + 20;
            orb.style.width = size + "px";
            orb.style.height = size + "px";
            orb.style.left = Math.random() * 100 + "%";
            orb.style.bottom = "0";

            const duration = Math.random() * 10 + 15;
            orb.style.animationDuration = duration + "s";
            orb.style.animationDelay = Math.random() * 5 + "s";

            container.appendChild(orb);
          }
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", createMinimalParticles);
        } else {
          createMinimalParticles();
        }
      })();
    </script>

    <!-- SIMPLE AND DIRECT PASSWORD TOGGLE SCRIPT -->
    <script>
      // Simple and direct approach - guaranteed to work
      document.addEventListener("DOMContentLoaded", function () {
        // Get the elements
        const toggleBtn = document.getElementById("togglePassword");
        const passwordField = document.getElementById("login-password");

        if (toggleBtn && passwordField) {
          // Remove any existing event listeners
          const newToggleBtn = toggleBtn.cloneNode(true);
          toggleBtn.parentNode.replaceChild(newToggleBtn, toggleBtn);

          // Add click event to the new button
          newToggleBtn.addEventListener("click", function (e) {
            e.preventDefault();

            // Toggle password type
            if (passwordField.type === "password") {
              passwordField.type = "text";
              this.innerHTML =
                '<i class="fas fa-eye-slash" style="font-size: 1rem;"></i>';
            } else {
              passwordField.type = "password";
              this.innerHTML =
                '<i class="fas fa-eye" style="font-size: 1rem;"></i>';
            }
          });
        }
      });
    </script>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
