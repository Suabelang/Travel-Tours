<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <title>SNS Travel · Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23076653'>🌴</text></svg>"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      * {
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        overflow-x: hidden;
        width: 100%;
        min-height: 100vh;
      }

      body {
        background: #0f172a;
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .gradient-bg {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(52, 211, 153, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(139, 92, 246, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 40% 80%,
            rgba(249, 115, 22, 0.1) 0%,
            transparent 30%
          ),
          radial-gradient(
            circle at 90% 20%,
            rgba(236, 72, 153, 0.1) 0%,
            transparent 35%
          );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
      }

      @media (max-width: 480px) {
        .glass-card {
          padding: 1.5rem !important;
        }
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s;
        font-size: 16px !important;
        padding: 0.75rem 1rem 0.75rem 2.5rem !important;
      }

      .glass-input:focus {
        border-color: #34d399;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
      }

      /* Particle Container */
      #particles-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        pointer-events: none;
        will-change: transform, opacity;
      }

      .star-particle {
        background: white;
        border-radius: 50%;
        box-shadow:
          0 0 10px white,
          0 0 20px rgba(255, 255, 255, 0.5);
        animation: twinkle 3s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
        }
      }

      .bubble-particle {
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.8),
          rgba(255, 255, 255, 0.1)
        );
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        animation: bubble 8s ease-in-out infinite;
      }

      @keyframes bubble {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }
        20% {
          opacity: 0.6;
          transform: translateY(80vh) scale(1);
        }
        80% {
          opacity: 0.4;
          transform: translateY(20vh) scale(1.2);
        }
        100% {
          transform: translateY(-100px) scale(1.5);
          opacity: 0;
        }
      }

      .confetti-particle {
        background: linear-gradient(45deg, #f97316, #e11d48, #8b5cf6, #34d399);
        clip-path: polygon(
          20% 0%,
          80% 0%,
          100% 20%,
          100% 80%,
          80% 100%,
          20% 100%,
          0% 80%,
          0% 20%
        );
        animation: fall 6s linear infinite;
      }

      @keyframes fall {
        0% {
          transform: translateY(-100px) rotate(0deg);
          opacity: 0;
        }
        20% {
          opacity: 0.8;
        }
        80% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(calc(100vh + 100px)) rotate(720deg);
          opacity: 0;
        }
      }

      .firefly-particle {
        background: #fbbf24;
        border-radius: 50%;
        box-shadow:
          0 0 20px #fbbf24,
          0 0 40px #f59e0b;
        animation: firefly 5s ease-in-out infinite;
      }

      @keyframes firefly {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
          opacity: 0.3;
        }
        25% {
          transform: translate(50px, -30px) scale(1.5);
          opacity: 1;
        }
        50% {
          transform: translate(-30px, 40px) scale(0.8);
          opacity: 0.6;
        }
        75% {
          transform: translate(40px, -20px) scale(1.2);
          opacity: 0.8;
        }
      }

      .orb-particle {
        background: radial-gradient(
          circle at center,
          rgba(52, 211, 153, 0.8) 0%,
          rgba(52, 211, 153, 0.3) 50%,
          transparent 80%
        );
        border-radius: 50%;
        filter: blur(5px);
        animation:
          glow 4s ease-in-out infinite,
          float 20s linear infinite;
      }

      @keyframes glow {
        0%,
        100% {
          opacity: 0.3;
          filter: blur(5px);
        }
        50% {
          opacity: 0.8;
          filter: blur(8px);
        }
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) translateX(0);
        }
        100% {
          transform: translateY(-100vh) translateX(100px);
        }
      }

      .compass-spin {
        animation: spinSlow 20s linear infinite;
      }

      @keyframes spinSlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.1);
        }
      }

      .glow-text {
        text-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
      }

      .checkbox-custom {
        transition: all 0.2s;
      }

      input[type="checkbox"]:checked + .checkbox-custom {
        border-color: #34d399;
        background: rgba(52, 211, 153, 0.1);
      }

      input[type="checkbox"]:checked + .checkbox-custom i {
        display: block;
      }

      /* ===== RESPONSIVE FIXES ===== */
      @media (max-width: 640px) {
        h1.text-4xl {
          font-size: 2rem;
        }

        .w-24.h-24 {
          width: 4rem;
          height: 4rem;
        }

        .text-4xl {
          font-size: 1.5rem;
        }

        .absolute.top-6.right-6 {
          top: 1rem;
          right: 1rem;
        }

        .px-6.py-3 {
          padding: 0.5rem 1rem;
          font-size: 0.8rem;
        }

        .min-h-screen {
          padding: 1rem;
        }
      }

      @media (max-width: 380px) {
        .flex.justify-center.gap-4 {
          gap: 0.5rem;
        }

        .w-12.h-12 {
          width: 2.5rem;
          height: 2.5rem;
        }
      }

      /* Touch targets */
      button,
      a,
      .glass-input {
        touch-action: manipulation;
      }

      @media (max-width: 768px) {
        button,
        a {
          min-height: 44px;
        }
      }

      /* Safe area for notched phones */
      @supports (padding: max(0px)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }
    </style>
  </head>
  <body>
    <!-- Gradient Background -->
    <div class="gradient-bg"></div>

    <!-- Particle Container -->
    <div id="particles-container"></div>

    <!-- Back Button -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-50">
      <a
        href="../index.html"
        class="group relative px-4 py-2 sm:px-6 sm:py-3 bg-white/5 backdrop-blur-md rounded-full border border-white/10 hover:border-white/30 transition-all duration-300 text-white/70 hover:text-white text-xs sm:text-sm"
      >
        <span class="flex items-center gap-1 sm:gap-2">
          <i
            class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform duration-300"
          ></i>
          <span class="hidden xs:inline">Back to Home</span>
          <span class="xs:hidden">Back</span>
        </span>
      </a>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-md relative z-20 px-4">
      <!-- Logo -->
      <div class="text-center mb-6 sm:mb-8">
        <div class="relative inline-block">
          <div
            class="absolute inset-0 bg-emerald-500/20 blur-2xl rounded-full pulse"
          ></div>
          <div
            class="relative w-20 h-20 sm:w-24 sm:h-24 mx-auto mb-3 sm:mb-4 glass-card rounded-2xl flex items-center justify-center compass-spin"
          >
            <i class="fas fa-compass text-3xl sm:text-4xl text-emerald-400"></i>
          </div>
        </div>
        <h1
          class="text-3xl sm:text-4xl font-light text-white tracking-[0.2em] sm:tracking-[0.3em] glow-text"
        >
          SNS
        </h1>
        <p class="text-white/40 text-xs sm:text-sm mt-1 sm:mt-2 tracking-wider">
          TRAVEL & TOURS
        </p>
      </div>

      <!-- Login Card -->
      <div
        class="glass-card rounded-2xl sm:rounded-3xl p-6 sm:p-8 relative overflow-hidden"
      >
        <div
          class="absolute -top-20 -right-20 w-40 h-40 bg-emerald-500/5 rounded-full blur-3xl"
        ></div>
        <div
          class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500/5 rounded-full blur-3xl"
        ></div>

        <h2
          class="text-xl sm:text-2xl font-light text-white mb-6 sm:mb-8 text-center relative"
        >
          <span class="relative inline-block">
            Sign In
            <span
              class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-10 sm:w-12 h-0.5 bg-emerald-400/50"
            ></span>
          </span>
        </h2>

        <form id="loginForm" class="space-y-4 sm:space-y-6 relative">
          <!-- Email -->
          <div class="relative group">
            <div
              class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors"
            >
              <i class="fas fa-envelope text-sm sm:text-base"></i>
            </div>
            <input
              type="email"
              id="login-email"
              required
              class="glass-input w-full pl-10 sm:pl-12 pr-4 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 text-sm sm:text-base"
              placeholder="Email address"
            />
          </div>

          <!-- Password -->
          <div class="relative group">
            <div
              class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors"
            >
              <i class="fas fa-lock text-sm sm:text-base"></i>
            </div>
            <input
              type="password"
              id="login-password"
              required
              class="glass-input w-full pl-10 sm:pl-12 pr-10 sm:pr-12 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 text-sm sm:text-base"
              placeholder="Password"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-emerald-400 transition-colors"
            >
              <i class="fas fa-eye text-sm sm:text-base"></i>
            </button>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between text-xs sm:text-sm">
            <label class="flex items-center cursor-pointer group">
              <input type="checkbox" id="remember-me" class="hidden" />
              <div
                class="w-3 h-3 sm:w-4 sm:h-4 border border-white/20 rounded mr-1 sm:mr-2 flex items-center justify-center text-emerald-400 group-hover:border-white/40 transition-colors checkbox-custom"
              >
                <i class="fas fa-check text-[0.5rem] sm:text-xs hidden"></i>
              </div>
              <span
                class="text-white/50 group-hover:text-white/70 transition-colors"
                >Remember me</span
              >
            </label>
            <a
              href="#"
              id="forgotLink"
              class="text-white/30 hover:text-emerald-400 transition-colors flex items-center gap-1"
            >
              <span>Forgot?</span>
              <i class="fas fa-arrow-right text-[0.6rem] sm:text-xs"></i>
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            id="loginBtn"
            class="group relative w-full bg-gradient-to-r from-emerald-500/20 to-purple-500/20 hover:from-emerald-500/30 hover:to-purple-500/30 text-emerald-400 font-medium py-3 sm:py-4 rounded-xl transition-all border border-emerald-500/30 overflow-hidden text-sm sm:text-base"
          >
            <span
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"
            ></span>
            <span
              class="relative flex items-center justify-center gap-2 sm:gap-3"
            >
              <i
                class="fas fa-arrow-right group-hover:translate-x-1 transition-transform text-xs sm:text-sm"
              ></i>
              <span>Continue to Dashboard</span>
              <i
                class="fas fa-arrow-right group-hover:translate-x-1 transition-transform text-xs sm:text-sm"
              ></i>
            </span>
          </button>

          <!-- Social Divider -->
          <div class="relative">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-[0.6rem] sm:text-xs">
              <span class="px-3 sm:px-4 bg-[#0f172a] text-white/30"
                >or continue with</span
              >
            </div>
          </div>

          <!-- Social Buttons -->
          <div class="flex justify-center gap-2 sm:gap-4">
            <button
              type="button"
              class="relative group w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/10 hover:border-white/30 text-white/30 hover:text-white transition-all duration-300 overflow-hidden"
            >
              <span
                class="absolute inset-0 bg-white/5 scale-0 group-hover:scale-100 rounded-full transition-transform duration-300"
              ></span>
              <i class="fab fa-google text-sm sm:text-base relative z-10"></i>
            </button>
            <button
              type="button"
              class="relative group w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/10 hover:border-white/30 text-white/30 hover:text-white transition-all duration-300 overflow-hidden"
            >
              <span
                class="absolute inset-0 bg-white/5 scale-0 group-hover:scale-100 rounded-full transition-transform duration-300"
              ></span>
              <i class="fab fa-apple text-sm sm:text-base relative z-10"></i>
            </button>
            <button
              type="button"
              class="relative group w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/10 hover:border-white/30 text-white/30 hover:text-white transition-all duration-300 overflow-hidden"
            >
              <span
                class="absolute inset-0 bg-white/5 scale-0 group-hover:scale-100 rounded-full transition-transform duration-300"
              ></span>
              <i
                class="fab fa-facebook-f text-sm sm:text-base relative z-10"
              ></i>
            </button>
          </div>
        </form>

        <p
          class="text-center mt-6 sm:mt-8 text-white/30 text-xs sm:text-sm relative"
        >
          New to SNS?
          <a
            href="#"
            class="text-emerald-400 hover:text-emerald-300 transition-colors group"
          >
            Contact us
            <i
              class="fas fa-arrow-right ml-1 text-[0.6rem] sm:text-xs group-hover:translate-x-1 transition-transform"
            ></i>
          </a>
        </p>
      </div>
    </div>

    <!-- Particle Generation Script -->
    <script>
      (function () {
        function createMixedParticles() {
          const container = document.getElementById("particles-container");
          if (!container) return;

          container.innerHTML = "";

          const particleTypes = [
            {
              class: "star-particle",
              count: 30,
              colors: ["white", "#fbbf24", "#34d399"],
            },
            {
              class: "bubble-particle",
              count: 20,
              colors: ["rgba(255,255,255,0.3)"],
            },
            {
              class: "confetti-particle",
              count: 25,
              colors: ["#f97316", "#e11d48", "#8b5cf6", "#34d399"],
            },
            { class: "firefly-particle", count: 15, colors: ["#fbbf24"] },
            {
              class: "orb-particle",
              count: 20,
              colors: ["#34d399", "#8b5cf6"],
            },
          ];

          particleTypes.forEach((type) => {
            for (let i = 0; i < type.count; i++) {
              const particle = document.createElement("div");
              particle.className = `particle ${type.class}`;

              const size = Math.random() * 20 + 2;
              particle.style.width = size + "px";
              particle.style.height = size + "px";

              particle.style.left = Math.random() * 100 + "%";
              particle.style.top = Math.random() * 100 + "%";

              if (type.colors && type.colors.length > 0) {
                const color =
                  type.colors[Math.floor(Math.random() * type.colors.length)];
                particle.style.background = color;
                particle.style.boxShadow = `0 0 20px ${color}`;
              }

              const duration = Math.random() * 10 + 5;
              const delay = Math.random() * 5;
              particle.style.animationDuration = duration + "s";
              particle.style.animationDelay = delay + "s";

              container.appendChild(particle);
            }
          });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", createMixedParticles);
        } else {
          createMixedParticles();
        }

        setTimeout(createMixedParticles, 100);
      })();
    </script>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
