<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <title>SNS Travel · Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="./assets/js/config.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      * {
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        overflow-x: hidden;
        width: 100%;
        min-height: 100vh;
      }

      body {
        background: #0f172a;
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .gradient-bg {
        position: fixed;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(52, 211, 153, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(139, 92, 246, 0.15) 0%,
            transparent 40%
          );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s;
        font-size: 16px !important;
        padding: 0.75rem 1rem 0.75rem 2.5rem !important;
      }

      .glass-input:focus {
        border-color: #34d399;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
      }

      .strength-bar {
        height: 4px;
        transition: all 0.3s;
        border-radius: 2px;
      }

      .strength-weak {
        background: #ef4444;
        width: 33.33%;
      }

      .strength-medium {
        background: #f59e0b;
        width: 66.66%;
      }

      .strength-strong {
        background: #34d399;
        width: 100%;
      }

      .spinner {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ===== RESPONSIVE FIXES ===== */
      @media (max-width: 640px) {
        .glass-card {
          padding: 1.5rem !important;
        }

        h1.text-3xl {
          font-size: 1.5rem;
        }

        .w-20.h-20 {
          width: 4rem;
          height: 4rem;
        }

        .text-3xl {
          font-size: 1.5rem;
        }

        .absolute.top-6.right-6 {
          top: 1rem;
          right: 1rem;
        }

        .px-4.py-2 {
          padding: 0.3rem 0.8rem;
          font-size: 0.8rem;
        }
      }

      /* Touch targets */
      button,
      a,
      .glass-input {
        touch-action: manipulation;
      }

      @media (max-width: 768px) {
        button,
        a {
          min-height: 44px;
        }
      }

      /* Safe area */
      @supports (padding: max(0px)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }
    </style>
  </head>
  <body>
    <div class="gradient-bg"></div>

    <!-- Back to Login -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-50">
      <a
        href="login.html"
        class="text-white/50 hover:text-white transition-colors text-xs sm:text-sm flex items-center gap-1 sm:gap-2 group"
      >
        <i
          class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform text-xs sm:text-sm"
        ></i>
        <span class="hidden xs:inline">Back to Login</span>
        <span class="xs:hidden">Back</span>
      </a>
    </div>

    <div class="w-full max-w-md relative z-20 px-4">
      <!-- Logo -->
      <div class="text-center mb-6 sm:mb-8">
        <div
          class="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-3 sm:mb-4 glass-card rounded-xl sm:rounded-2xl flex items-center justify-center"
        >
          <i class="fas fa-key text-2xl sm:text-3xl text-emerald-400"></i>
        </div>
        <h1
          class="text-2xl sm:text-3xl font-light text-white tracking-[0.1em] sm:tracking-[0.2em]"
        >
          Reset Password
        </h1>
        <p
          class="text-white/40 text-xs sm:text-sm mt-1 sm:mt-2"
          id="statusMessage"
        >
          Verifying your link...
        </p>
      </div>

      <!-- Reset Card -->
      <div
        class="glass-card rounded-2xl sm:rounded-3xl p-6 sm:p-8 relative overflow-hidden"
      >
        <div
          class="absolute -top-20 -right-20 w-40 h-40 bg-emerald-500/5 rounded-full blur-3xl"
        ></div>
        <div
          class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500/5 rounded-full blur-3xl"
        ></div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-6 sm:py-8">
          <div
            class="inline-block w-10 h-10 sm:w-12 sm:h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full spinner mb-3 sm:mb-4"
          ></div>
          <p class="text-white/70 text-sm sm:text-base">
            Verifying your reset link...
          </p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-6 sm:py-8">
          <div
            class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-3 sm:mb-4 bg-red-500/20 rounded-full flex items-center justify-center"
          >
            <i
              class="fas fa-exclamation-triangle text-2xl sm:text-3xl text-red-400"
            ></i>
          </div>
          <h3 class="text-lg sm:text-xl font-semibold text-white mb-2">
            Invalid or Expired Link
          </h3>
          <p class="text-white/50 text-xs sm:text-sm mb-4 sm:mb-6">
            The password reset link is no longer valid. Please request a new
            one.
          </p>
          <a
            href="login.html"
            class="inline-block px-5 sm:px-6 py-2 sm:py-3 bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 rounded-xl transition-all border border-emerald-500/30 text-sm sm:text-base"
          >
            Back to Login
          </a>
        </div>

        <!-- Reset Form -->
        <form id="resetForm" class="hidden space-y-5 sm:space-y-6">
          <div>
            <div class="relative group mb-2">
              <div
                class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors"
              >
                <i class="fas fa-lock text-sm sm:text-base"></i>
              </div>
              <input
                type="password"
                id="new-password"
                required
                minlength="6"
                class="glass-input w-full pl-10 sm:pl-12 pr-10 sm:pr-12 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 focus:outline-none text-sm sm:text-base"
                placeholder="New password"
              />
              <button
                type="button"
                class="toggle-new absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-emerald-400 transition-colors"
                onclick="togglePasswordVisibility('new-password', this)"
              >
                <i class="fas fa-eye text-sm sm:text-base"></i>
              </button>
            </div>
            <div
              class="strength-bar w-full bg-white/10 rounded-full overflow-hidden mb-3 sm:mb-4"
              id="strengthBar"
            ></div>
            <p
              class="text-[0.6rem] sm:text-xs text-white/30 mt-1"
              id="strengthText"
            >
              Minimum 6 characters
            </p>
          </div>

          <div>
            <div class="relative group">
              <div
                class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-emerald-400 transition-colors"
              >
                <i class="fas fa-lock text-sm sm:text-base"></i>
              </div>
              <input
                type="password"
                id="confirm-password"
                required
                minlength="6"
                class="glass-input w-full pl-10 sm:pl-12 pr-10 sm:pr-12 py-3 sm:py-4 rounded-xl text-white placeholder-white/30 focus:outline-none text-sm sm:text-base"
                placeholder="Confirm password"
              />
              <button
                type="button"
                class="toggle-confirm absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-emerald-400 transition-colors"
                onclick="togglePasswordVisibility('confirm-password', this)"
              >
                <i class="fas fa-eye text-sm sm:text-base"></i>
              </button>
            </div>
            <p class="text-xs mt-2" id="matchIndicator"></p>
          </div>

          <button
            type="submit"
            id="resetBtn"
            disabled
            class="w-full bg-emerald-500/20 text-emerald-400 font-medium py-3 sm:py-4 rounded-xl border border-emerald-500/30 opacity-50 cursor-not-allowed flex items-center justify-center gap-2 text-sm sm:text-base"
          >
            <i class="fas fa-save text-xs sm:text-sm"></i>
            Update Password
          </button>
        </form>
      </div>

      <p class="text-center mt-4 sm:mt-6 text-white/30 text-xs sm:text-sm">
        Remember your password?
        <a
          href="login.html"
          class="text-emerald-400 hover:text-emerald-300 transition-colors"
        >
          Sign in
        </a>
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      // ===== USE CONFIG FROM config.js =====
      if (typeof CONFIG === "undefined") {
        console.error("❌ CONFIG is not defined! Using fallback values.");
        var SUPABASE_URL = "https://rpapduavenpzwtptgopm.supabase.co";
        var SUPABASE_ANON_KEY =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwYXBkdWF2ZW5wend0cHRnb3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NTI5NDUsImV4cCI6MjA4NjMyODk0NX0.IVTVByGm8LuykvYQ5wRzK4WBT1mA9Ew5fy6uTjokMbg";
      } else {
        var SUPABASE_URL = CONFIG.SUPABASE_URL;
        var SUPABASE_ANON_KEY = CONFIG.SUPABASE_ANON_KEY;
      }

      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
        {
          autoRefreshToken: true,
          persistSession: true,
          detectSessionInUrl: true,
        },
      );

      // DOM Elements
      const loadingState = document.getElementById("loadingState");
      const errorState = document.getElementById("errorState");
      const resetForm = document.getElementById("resetForm");
      const newPassword = document.getElementById("new-password");
      const confirmPassword = document.getElementById("confirm-password");
      const resetBtn = document.getElementById("resetBtn");
      const strengthBar = document.getElementById("strengthBar");
      const strengthText = document.getElementById("strengthText");
      const matchIndicator = document.getElementById("matchIndicator");
      const statusMessage = document.getElementById("statusMessage");

      // Toggle password visibility
      window.togglePasswordVisibility = (inputId, button) => {
        const input = document.getElementById(inputId);
        const icon = button.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      };

      // Password strength check
      function checkPasswordStrength(password) {
        if (!password) return { strength: 0, text: "Minimum 6 characters" };
        let strength = 0;
        if (password.length >= 6) strength += 1;
        if (password.length >= 8) strength += 1;
        if (/[A-Z]/.test(password)) strength += 1;
        if (/[0-9]/.test(password)) strength += 1;
        if (/[^A-Za-z0-9]/.test(password)) strength += 1;
        return {
          strength: Math.min(strength, 3),
          text: strength <= 1 ? "Weak" : strength === 2 ? "Medium" : "Strong",
        };
      }

      newPassword.addEventListener("input", () => {
        const result = checkPasswordStrength(newPassword.value);
        strengthBar.className = "strength-bar overflow-hidden mb-4";
        if (result.strength <= 1) {
          strengthBar.classList.add("strength-weak");
          strengthText.textContent = "Weak password";
          strengthText.className = "text-xs text-red-400 mt-1";
        } else if (result.strength === 2) {
          strengthBar.classList.add("strength-medium");
          strengthText.textContent = "Medium password";
          strengthText.className = "text-xs text-yellow-400 mt-1";
        } else {
          strengthBar.classList.add("strength-strong");
          strengthText.textContent = "Strong password";
          strengthText.className = "text-xs text-emerald-400 mt-1";
        }
        validateForm();
      });

      function checkPasswordMatch() {
        const newVal = newPassword.value;
        const confirmVal = confirmPassword.value;
        if (!confirmVal) {
          matchIndicator.textContent = "";
          return false;
        }
        if (newVal === confirmVal) {
          matchIndicator.textContent = "✓ Passwords match";
          matchIndicator.className = "text-xs text-emerald-400 mt-2";
          return true;
        } else {
          matchIndicator.textContent = "✗ Passwords do not match";
          matchIndicator.className = "text-xs text-red-400 mt-2";
          return false;
        }
      }

      confirmPassword.addEventListener("input", () => {
        checkPasswordMatch();
        validateForm();
      });

      function validateForm() {
        const newVal = newPassword.value;
        const confirmVal = confirmPassword.value;
        const strength = checkPasswordStrength(newVal).strength;
        const isValid =
          newVal.length >= 6 && newVal === confirmVal && strength >= 1;
        if (isValid) {
          resetBtn.disabled = false;
          resetBtn.className =
            "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-4 rounded-xl transition-all border border-emerald-500 shadow-lg flex items-center justify-center gap-2";
        } else {
          resetBtn.disabled = true;
          resetBtn.className =
            "w-full bg-emerald-500/20 text-emerald-400 font-medium py-4 rounded-xl border border-emerald-500/30 opacity-50 cursor-not-allowed flex items-center justify-center gap-2";
        }
      }

      // Check session on page load - COMPLETE FIX
      async function checkSession() {
        try {
          statusMessage.textContent = "Verifying your link...";

          // IMPORTANT: I-check muna kung may access_token sa URL hash
          const hash = window.location.hash.substring(1); // Remove the #
          const params = new URLSearchParams(hash);
          const accessToken = params.get("access_token");
          const refreshToken = params.get("refresh_token");
          const type = params.get("type");

          console.log("🔍 URL Debug:");
          console.log("   Full URL:", window.location.href);
          console.log("   Hash:", window.location.hash);
          console.log("   Access token in URL:", accessToken ? "YES" : "NO");
          console.log("   Type:", type);

          // Kung may access_token sa URL at ito ay recovery type
          if (accessToken && type === "recovery") {
            console.log("✅ Recovery token found in URL");

            try {
              // I-set ang session gamit ang token
              const { data, error } = await supabaseClient.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken,
              });

              if (error) {
                console.error("Set session error:", error);
                throw error;
              }

              if (data.session) {
                console.log("✅ Session set successfully");

                // I-clear ang URL hash para hindi lumabas ang tokens
                history.replaceState(null, null, window.location.pathname);

                loadingState.classList.add("hidden");
                resetForm.classList.remove("hidden");
                statusMessage.textContent = "Enter your new password";
                return;
              }
            } catch (sessionError) {
              console.error("Error setting session:", sessionError);
              // Continue to try getSession
            }
          }

          // Kung walang token sa URL o may error, try ang regular getSession
          const {
            data: { session },
            error,
          } = await supabaseClient.auth.getSession();

          if (error) {
            console.error("Get session error:", error);
            throw error;
          }

          if (!session) {
            console.log("❌ No active session found");
            loadingState.classList.add("hidden");
            errorState.classList.remove("hidden");
            statusMessage.textContent = "Invalid or expired link";
          } else {
            console.log("✅ Active session found");
            loadingState.classList.add("hidden");
            resetForm.classList.remove("hidden");
            statusMessage.textContent = "Enter your new password";
          }
        } catch (err) {
          console.error("Session check error:", err);
          loadingState.classList.add("hidden");
          errorState.classList.remove("hidden");
          statusMessage.textContent = "Error validating link";
        }
      }

      // Handle form submission
      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const newPass = newPassword.value.trim();
        const confirmPass = confirmPassword.value.trim();

        if (newPass.length < 6) {
          Swal.fire({
            icon: "error",
            title: "Too Short",
            text: "Password must be at least 6 characters.",
            confirmButtonColor: "#34d399",
            background: "#1e293b",
            color: "#fff",
          });
          return;
        }
        if (newPass !== confirmPass) {
          Swal.fire({
            icon: "error",
            title: "Mismatch",
            text: "Passwords do not match.",
            confirmButtonColor: "#34d399",
            background: "#1e293b",
            color: "#fff",
          });
          return;
        }

        // I-double check ang session bago mag-update
        const {
          data: { session },
          error: sessionError,
        } = await supabaseClient.auth.getSession();

        if (sessionError || !session) {
          Swal.fire({
            icon: "error",
            title: "Session Expired",
            text: "Your password reset session has expired. Please request a new reset link.",
            confirmButtonColor: "#34d399",
            background: "#1e293b",
            color: "#fff",
          }).then(() => {
            window.location.href = "login.html";
          });
          return;
        }

        resetBtn.disabled = true;
        resetBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Updating...';

        try {
          const { error } = await supabaseClient.auth.updateUser({
            password: newPass,
          });

          if (error) throw error;

          await Swal.fire({
            icon: "success",
            title: "Password Updated!",
            text: "You can now login with your new password.",
            confirmButtonColor: "#34d399",
            background: "#1e293b",
            color: "#fff",
            timer: 3000,
            timerProgressBar: true,
          });

          // Sign out para mag-expire ang session
          await supabaseClient.auth.signOut();

          // Redirect to login
          window.location.href = "login.html";
        } catch (error) {
          console.error("Update error:", error);

          let errorMessage = error.message;
          if (error.message.includes("same as the old password")) {
            errorMessage =
              "New password must be different from your current password.";
          } else if (error.message.includes("weak")) {
            errorMessage =
              "Password is too weak. Please choose a stronger password.";
          }

          Swal.fire({
            icon: "error",
            title: "Update Failed",
            text: errorMessage,
            confirmButtonColor: "#34d399",
            background: "#1e293b",
            color: "#fff",
          });

          resetBtn.disabled = false;
          resetBtn.innerHTML =
            '<i class="fas fa-save mr-2"></i> Update Password';
        }
      });

      // Start checking
      checkSession();
    </script>
  </body>
</html>
